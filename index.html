<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOM Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-title-row">
        <div>
          <h1>BOM Tracker</h1>
          <p>Bill of Materials</p>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button id="new-bom-btn">+ New</button>
          <button id="hide-sidebar-btn" title="Hide sidebar">‹</button>
        </div>
      </div>
      <div id="currency-row">
        <select id="currency-select"></select>
        <span id="rates-status"></span>
      </div>
    </div>
    <div id="bom-list"></div>
  </div>

  <button id="show-sidebar-btn" title="Show sidebar">›</button>

  <div id="main"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
