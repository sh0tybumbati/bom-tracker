<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOM Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="topbar">
    <button id="bom-picker-btn" title="Switch BOM">
      <span id="topbar-bom-name">No BOM</span>
      <span class="topbar-caret">▾</span>
    </button>
    <button id="new-bom-btn" class="topbar-icon-btn" title="New BOM">+</button>
    <button id="import-csv-btn" class="topbar-icon-btn" title="Import CSV">↑</button>
    <button id="export-csv-btn" class="topbar-icon-btn" title="Export CSV">↓</button>
    <select id="currency-select"></select>
    <span id="rates-status"></span>
  </div>

  <div id="main"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
